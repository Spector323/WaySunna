<!-- Кнопка: Добавить товар -->
<button *ngIf="isAdmin" class="btn-admin-add" (click)="openAddModal()">➕ Добавить товар</button>

<!-- Модалка -->
<div class="modal-overlay" *ngIf="modalVisible" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <h2>{{ selectedProduct ? 'Редактировать товар' : 'Добавить товар' }}</h2>

    <div class="form-group">
      <label>Название</label>
      <input [(ngModel)]="selectedProduct?.name" *ngIf="selectedProduct" />
      <input [(ngModel)]="selectedProduct?.name" *ngIf="!selectedProduct" />
    </div>

    <div class="form-group">
      <label>Описание</label>
      <textarea [(ngModel)]="selectedProduct?.description"></textarea>
    </div>

    <div class="form-group">
      <label>Цена</label>
      <input type="number" [(ngModel)]="selectedProduct?.price" />
    </div>

    <div class="form-group">
      <label>Ссылка на изображение</label>
      <input [(ngModel)]="selectedProduct?.image" />
    </div>

    <button (click)="saveProduct(selectedProduct)">Сохранить</button>
    <button (click)="closeModal()">Отмена</button>
  </div>
</div>

<!-- Поиск -->
<div class="search">
  <input type="text" (input)="search($event)" placeholder="🔍 Поиск..." />
</div>

<!-- Карточки -->
<div class="products">
  <div *ngFor="let product of filterProducts" class="card">
    <div class="img-card">
      <img [src]="'http://localhost:5000/' + product.image" />
    </div>
    <div class="card-info">
      <p class="card-title">{{ product.name }}</p>
      <p class="card-description">{{ product.description }}</p>
      <p class="card-price">₽{{ product.price }}</p>
      <button (click)="addProductBasket(product)">🛒 В корзину</button>

      <!-- Админ-кнопки -->
      <div *ngIf="isAdmin" class="admin-actions">
        <button (click)="editProduct(product)" class="edit-btn">✏️</button>
        <button (click)="deleteProduct(product._id)" class="delete-btn">❌</button>
      </div>
    </div>
  </div>
</div>
